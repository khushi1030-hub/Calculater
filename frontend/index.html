<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <header class="calculator-header">
            <h1>Scientific Calculator</h1>
            <div class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </div>
        </header>

        <div class="display-area">
            <div class="expression-display" id="expressionDisplay" aria-label="Expression"></div>
            <div class="result-display" id="resultDisplay" aria-label="Result">0</div>
        </div>

        <div class="keypad">
            <!-- Scientific functions row -->
            <div class="button-row scientific-row">
                <button class="btn btn-func" data-func="sin" title="Sine">sin</button>
                <button class="btn btn-func" data-func="cos" title="Cosine">cos</button>
                <button class="btn btn-func" data-func="tan" title="Tangent">tan</button>
                <button class="btn btn-func" data-func="asin" title="Arcsine">asin</button>
                <button class="btn btn-func" data-func="acos" title="Arccosine">acos</button>
                <button class="btn btn-func" data-func="atan" title="Arctangent">atan</button>
            </div>
            <div class="button-row scientific-row">
                <button class="btn btn-func" data-func="log" title="Log base 10">log</button>
                <button class="btn btn-func" data-func="ln" title="Natural log">ln</button>
                <button class="btn btn-func" data-func="exp" title="e^x">exp</button>
                <button class="btn btn-func" data-func="sqrt" title="Square root">√</button>
                <button class="btn btn-func" data-func="pow" title="Power (x^y)">xʸ</button>
                <button class="btn btn-const" data-const="pi" title="Pi (π)">π</button>
            </div>

            <!-- Main calculator grid -->
            <div class="button-row">
                <button class="btn btn-func" data-func="(" title="Left parenthesis">(</button>
                <button class="btn btn-func" data-func=")" title="Right parenthesis">)</button>
                <button class="btn btn-action" data-action="clear" title="Clear">C</button>
                <button class="btn btn-action" data-action="backspace" title="Backspace">⌫</button>
            </div>

            <div class="button-row">
                <button class="btn btn-num" data-value="7">7</button>
                <button class="btn btn-num" data-value="8">8</button>
                <button class="btn btn-num" data-value="9">9</button>
                <button class="btn btn-op" data-value="/">÷</button>
            </div>

            <div class="button-row">
                <button class="btn btn-num" data-value="4">4</button>
                <button class="btn btn-num" data-value="5">5</button>
                <button class="btn btn-num" data-value="6">6</button>
                <button class="btn btn-op" data-value="*">×</button>
            </div>

            <div class="button-row">
                <button class="btn btn-num" data-value="1">1</button>
                <button class="btn btn-num" data-value="2">2</button>
                <button class="btn btn-num" data-value="3">3</button>
                <button class="btn btn-op" data-value="-">−</button>
            </div>

            <div class="button-row">
                <button class="btn btn-num" data-value="0">0</button>
                <button class="btn btn-num" data-value=".">.</button>
                <button class="btn btn-const" data-const="e" title="Euler's number (e)">e</button>
                <button class="btn btn-op" data-value="+">+</button>
            </div>

            <div class="button-row">
                <button class="btn btn-equals" data-action="equals" title="Calculate">=</button>
            </div>
        </div>

        <div class="history-panel" id="historyPanel" aria-live="polite">
            <h3>History</h3>
            <ul id="historyList"></ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
